<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Dados</title>
</head>
<body>
    
        <form method="POST" action="03_tiposdados.php">
            
            <h2>Cadastro de Usuário</h2>

            Nome:<br>
            <input type="text" name="nome"><br><br>
            Telefone: <br>
            <input type="tel"  name="telefone"><br><br>
            Email: <br>
            <input type="email" name="email"><br><br>
            Senha: <br>
            <input type="password" name="senha"><br><br>
            Confirme a Senha: <br>
            <input type="password" name="confirmarSenha"><br><br>
            Site pessoal: <br>
            <input type="url" name="site"><br><br>
            <hr><br>

            Idade: <br>
            <input type="number" name="idade"><br><br>
            Data de Nascimento: <br>
            <input type="date" name="dataNascimento"><br><br>
            Hora do Cadastro: <br>
            <input type="time" name="hora"><br><br>
            <hr><br><br>

            Sexo:<br>
            <input type="radio" name="sexo" value="Feminino">Feminino
            <input type="radio" name="sexo" value="Masculino">Masculino
            <br><br>

            Interesses: <br>
            <input type="checkbox" name="interesses[0]" value="Leitura"> Leitura
            <input type="checkbox" name="interesses[1]" value="Exercicios"> Exercicios
            <input type="checkbox" name="interesses[2]" value="Esportes"> Esportes
            <br><br>

            Foto de parfil: <br>
            <input type="file" name="foto"><br><br>

            <input type="submit" value="Cadastrar">  
            <input type="reset" value="Limpar"><br><br>


        </form>

</body>
</html>
